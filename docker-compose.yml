version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: five-realms-db
    restart: always
    environment:
      POSTGRES_DB: five_realms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: